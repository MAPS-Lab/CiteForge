name: Monthly Pipeline Refresh

on:
  schedule:
    - cron: '0 4 1 * *'  # 4 AM UTC on the 1st of each month (midnight AST)
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      converged: ${{ steps.loop.outputs.converged }}
      runs_completed: ${{ steps.loop.outputs.runs_completed }}
      last_api_calls: ${{ steps.loop.outputs.last_api_calls }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -e .

      - name: Write API keys from secrets
        env:
          S2_KEY: ${{ secrets.SEMANTICSCHOLAR }}
          SERPAPI_KEY: ${{ secrets.SERPAPI }}
          SERPLY_KEY: ${{ secrets.SERPLY }}
          GEMINI_KEY: ${{ secrets.GEMINI }}
          OPENREVIEW_KEY: ${{ secrets.OPENREVIEW }}
        run: |
          mkdir -p keys
          echo "$S2_KEY"        > keys/Semantic.key
          echo "$SERPAPI_KEY"   > keys/SerpAPI.key
          echo "$SERPLY_KEY"    > keys/Serply.key
          echo "$GEMINI_KEY"    > keys/Gemini.key
          echo "$OPENREVIEW_KEY" > keys/OpenReview.key

      - name: Restore cache from data-cache branch
        run: |
          if git ls-remote --heads origin data-cache | grep -q data-cache; then
            git fetch origin data-cache
            if git show origin/data-cache:api_cache.tar.gz > /tmp/api_cache.tar.gz 2>/dev/null; then
              mkdir -p data
              tar xzf /tmp/api_cache.tar.gz -C data/
              echo "Restored $(find data/api_cache -type f | wc -l) cache entries"
            fi
          else
            echo "No data-cache branch — starting fresh"
          fi

      - name: Clear non-SerpAPI caches for fresh enrichment
        run: |
          if [ -d data/api_cache ]; then
            for ns in data/api_cache/*/; do
              name=$(basename "$ns")
              if [ "$name" != "serpapi_publications" ]; then
                rm -rf "$ns"
                echo "Cleared cache namespace: $name"
              fi
            done
            echo "Kept serpapi_publications ($(find data/api_cache/serpapi_publications -type f 2>/dev/null | wc -l) entries)"
          fi

      - name: Run pipeline loop
        id: loop
        env:
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
          CITEFORGE_MAX_WORKERS: "16"
          CITEFORGE_CONCURRENCY: "20"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          save_cache() {
            if [ -d data/api_cache ] && [ "$(ls -A data/api_cache 2>/dev/null)" ]; then
              entries=$(find data/api_cache -type f -name '*.json' | wc -l)
              tar czf /tmp/api_cache.tar.gz -C data api_cache
              size=$(du -h /tmp/api_cache.tar.gz | cut -f1)
              echo "Saving $entries cache entries ($size compressed)"

              # Push cache without disturbing the working tree
              cache_dir=$(mktemp -d)
              cp /tmp/api_cache.tar.gz "$cache_dir/"
              cd "$cache_dir"
              git init -q
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git checkout --orphan data-cache
              git add api_cache.tar.gz
              git commit -q -m "cache: $(date +%Y-%m-%d) — $entries entries ($size)"
              git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
              git push origin data-cache --force -q
              cd -
              rm -rf "$cache_dir"
            fi
          }

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          max_runs=50
          consecutive_stable=0
          converged=false
          prev_total=-1
          last_total=-1

          for i in $(seq 1 $max_runs); do
            echo "::group::Pipeline run $i/$max_runs"
            rc=0
            python3 main.py || rc=$?
            echo "::endgroup::"

            if [ "$rc" -ne 0 ]; then
              echo "::error::Pipeline run $i failed with exit code $rc"
              echo "Saving cache before exit..."
              save_cache "$i"
              echo "converged=false" >> "$GITHUB_OUTPUT"
              echo "runs_completed=$i" >> "$GITHUB_OUTPUT"
              echo "last_api_calls=-1" >> "$GITHUB_OUTPUT"
              exit 1
            fi

            # Parse total API calls from the run log
            total=$(grep -aoP 'Total API calls: \K\d+' output/run.log 2>/dev/null || echo "-1")
            last_total=$total
            echo "Run $i — API calls: $total (prev: $prev_total)"

            # Save cache after every iteration
            save_cache "$i"

            # Converge when API call count is stable across 2 consecutive runs
            if [ "$total" -eq "$prev_total" ]; then
              consecutive_stable=$((consecutive_stable + 1))
              if [ "$consecutive_stable" -ge 2 ]; then
                echo "API calls stable at $total over 3 consecutive runs — converged"
                converged=true
                break
              fi
              echo "API calls stable ($total) — confirming with one more run"
            else
              consecutive_stable=0
            fi
            prev_total=$total

            # Clear negative cache entries between iterations so rate-limited
            # lookups get retried. Only truly missing data persists as negative.
            if [ -d data/api_cache ]; then
              neg_cleared=$(find data/api_cache -name '*.json' -exec grep -l '"_negative": true' {} + 2>/dev/null | wc -l)
              find data/api_cache -name '*.json' -exec grep -l '"_negative": true' {} + 2>/dev/null | xargs rm -f
              echo "Cleared $neg_cleared negative cache entries before next run"
            fi

            if [ "$i" -eq "$max_runs" ]; then
              echo "Reached $max_runs runs without full convergence"
            fi
          done

          echo "converged=$converged" >> "$GITHUB_OUTPUT"
          echo "runs_completed=$i" >> "$GITHUB_OUTPUT"
          echo "last_api_calls=$last_total" >> "$GITHUB_OUTPUT"

      - name: Commit output to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update README badges from badges.json
          if [ -f output/badges.json ]; then
            LAST_UPDATED=$(python3 -c "import json; print(json.load(open('output/badges.json'))['last_updated'])")
            POS_HITS=$(python3 -c "import json; print(json.load(open('output/badges.json'))['cache_positive_hits'])")
            NEG_HITS=$(python3 -c "import json; print(json.load(open('output/badges.json'))['cache_negative_hits'])")
            LAST_UPDATED_ESC=$(echo "$LAST_UPDATED" | sed 's/-/--/g')
            sed -i "s|Updated-[0-9]*--[0-9]*-blue|Updated-${LAST_UPDATED_ESC}-blue|" README.md
            sed -i "s|Cache_Hits-[0-9]*_positive-brightgreen|Cache_Hits-${POS_HITS}_positive-brightgreen|" README.md
            sed -i "s|Cache_Misses-[0-9]*_negative-orange|Cache_Misses-${NEG_HITS}_negative-orange|" README.md
          fi

          git add output/ README.md
          if ! git diff --cached --quiet; then
            git commit -m "data: monthly pipeline refresh $(date +%Y-%m)"
            git push origin main
          else
            echo "No output changes to commit"
          fi

  verify:
    needs: refresh
    if: needs.refresh.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Report status
        run: |
          echo "## Pipeline Results"
          echo "Converged: ${{ needs.refresh.outputs.converged }}"
          echo "Runs completed: ${{ needs.refresh.outputs.runs_completed }}"
          echo "Last API calls: ${{ needs.refresh.outputs.last_api_calls }}"
          echo "Job result: ${{ needs.refresh.result }}"

      - name: Re-trigger if not converged
        if: needs.refresh.result == 'success' && needs.refresh.outputs.converged != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Pipeline did not converge — re-triggering with saved cache"
          gh workflow run "Monthly Pipeline Refresh" --repo "${{ github.repository }}"
          echo "::notice::Re-triggered workflow. Cache was saved incrementally — next run resumes from where this one stopped."

      - name: Fail if pipeline errored
        if: needs.refresh.result == 'failure'
        run: |
          echo "::error::Pipeline failed with errors. Check the refresh job logs."
          echo "Cache was saved before failure — manual re-trigger will resume from last good state."
          exit 1
