name: Monthly Pipeline Refresh

on:
  schedule:
    - cron: '0 4 1 * *'  # 4 AM UTC on the 1st of each month (midnight AST)
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      converged: ${{ steps.loop.outputs.converged }}
      runs_completed: ${{ steps.loop.outputs.runs_completed }}
      last_api_calls: ${{ steps.loop.outputs.last_api_calls }}

    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements.lock
          pip install -e . --no-deps

      - name: Write API keys from secrets
        env:
          S2_KEY: ${{ secrets.SEMANTICSCHOLAR }}
          SERPAPI_KEY: ${{ secrets.SERPAPI }}
          SERPLY_KEY: ${{ secrets.SERPLY }}
          GEMINI_KEY: ${{ secrets.GEMINI }}
          OPENREVIEW_KEY: ${{ secrets.OPENREVIEW }}
        run: |
          mkdir -p keys
          echo "$S2_KEY"        > keys/Semantic.key
          echo "$SERPAPI_KEY"   > keys/SerpAPI.key
          echo "$SERPLY_KEY"    > keys/Serply.key
          echo "$GEMINI_KEY"    > keys/Gemini.key
          echo "$OPENREVIEW_KEY" > keys/OpenReview.key

      - name: Restore cache from data-cache branch
        env:
          CACHE_ENCRYPTION_KEY: ${{ secrets.CACHE_ENCRYPTION_KEY }}
        run: |
          if [ -z "$CACHE_ENCRYPTION_KEY" ]; then
            echo "CACHE_ENCRYPTION_KEY unset — skipping cache restore (fresh start)"
          elif git ls-remote --heads origin data-cache | grep -q data-cache; then
            git fetch origin data-cache
            if git show origin/data-cache:api_cache.tar.gz.enc > /tmp/api_cache.tar.gz.enc 2>/dev/null; then
              if openssl enc -d -aes-256-cbc -pbkdf2 -pass env:CACHE_ENCRYPTION_KEY \
                   -in /tmp/api_cache.tar.gz.enc -out /tmp/api_cache.tar.gz 2>/dev/null; then
                mkdir -p data
                tar xzf /tmp/api_cache.tar.gz -C data/
                echo "Restored $(find data/api_cache -type f | wc -l) cache entries"
              else
                echo "Cache decrypt failed (key rotated?) — starting fresh"
              fi
            fi
          else
            echo "No data-cache branch — starting fresh"
          fi

      - name: Run pipeline loop
        id: loop
        env:
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
          CITEFORGE_MAX_WORKERS: "16"
          CITEFORGE_CONCURRENCY: "20"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CACHE_ENCRYPTION_KEY: ${{ secrets.CACHE_ENCRYPTION_KEY }}
        run: |
          save_cache() {
            if [ -z "$CACHE_ENCRYPTION_KEY" ]; then
              echo "CACHE_ENCRYPTION_KEY unset — skipping cache push (raw API responses must not reach the public data-cache branch)"
              return 0
            fi
            if [ -d data/api_cache ] && [ "$(ls -A data/api_cache 2>/dev/null)" ]; then
              entries=$(find data/api_cache -type f -name '*.json' | wc -l)
              tar czf /tmp/api_cache.tar.gz -C data api_cache
              openssl enc -aes-256-cbc -pbkdf2 -salt -pass env:CACHE_ENCRYPTION_KEY \
                -in /tmp/api_cache.tar.gz -out /tmp/api_cache.tar.gz.enc
              size=$(du -h /tmp/api_cache.tar.gz.enc | cut -f1)
              echo "Saving $entries cache entries ($size encrypted)"

              # Push cache without disturbing the working tree
              cache_dir=$(mktemp -d)
              cp /tmp/api_cache.tar.gz.enc "$cache_dir/"
              cd "$cache_dir"
              git init -q
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git checkout --orphan data-cache
              git add api_cache.tar.gz.enc
              git commit -q -m "cache: $(date +%Y-%m-%d) — $entries entries ($size, encrypted)"
              git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
              for attempt in 1 2 3; do
                if git push origin data-cache --force -q 2>/dev/null; then
                  break
                fi
                echo "Cache push attempt $attempt failed — retrying in ${attempt}0s..."
                sleep "${attempt}0"
              done
              cd -
              rm -rf "$cache_dir"
            fi
          }

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          max_runs=50
          consecutive_stable=0
          converged=false
          prev_total=-1
          last_total=-1

          for i in $(seq 1 $max_runs); do
            echo "::group::Pipeline run $i/$max_runs"
            rc=0
            python3 main.py || rc=$?
            echo "::endgroup::"

            if [ "$rc" -ne 0 ]; then
              echo "::error::Pipeline run $i failed with exit code $rc"
              echo "Saving cache before exit..."
              save_cache "$i"
              echo "converged=false" >> "$GITHUB_OUTPUT"
              echo "runs_completed=$i" >> "$GITHUB_OUTPUT"
              echo "last_api_calls=-1" >> "$GITHUB_OUTPUT"
              exit 1
            fi

            # Parse total API calls from the run log
            total=$(grep -aoP 'Total API calls: \K\d+' output/run.log 2>/dev/null || echo "-1")
            last_total=$total
            echo "Run $i — API calls: $total (prev: $prev_total)"

            # Save cache after every iteration
            save_cache "$i"

            # Delta-based convergence: stable when API call count changes
            # by at most CONVERGENCE_THRESHOLD across 2 consecutive runs.
            # Unconfirmed negatives (< 3 confirmations) are retried automatically
            # by the cache layer — no need to clear files between iterations.
            CONVERGENCE_THRESHOLD=50
            if [ "$prev_total" -ge 0 ]; then
              delta=$((total - prev_total))
              if [ "$delta" -lt 0 ]; then delta=$((-delta)); fi
              if [ "$delta" -le "$CONVERGENCE_THRESHOLD" ]; then
                consecutive_stable=$((consecutive_stable + 1))
                if [ "$consecutive_stable" -ge 2 ]; then
                  echo "API calls stable (delta=$delta, threshold=$CONVERGENCE_THRESHOLD) over 3 runs — converged"
                  converged=true
                  break
                fi
                echo "API calls within threshold (delta=$delta) — confirming with one more run"
              else
                consecutive_stable=0
              fi
            fi
            prev_total=$total

            if [ "$i" -eq "$max_runs" ]; then
              echo "Reached $max_runs runs without full convergence"
            fi
          done

          echo "converged=$converged" >> "$GITHUB_OUTPUT"
          echo "runs_completed=$i" >> "$GITHUB_OUTPUT"
          echo "last_api_calls=$last_total" >> "$GITHUB_OUTPUT"

      # Fresh token minted here (not at checkout): the pipeline loop can run for
      # hours and an app token lives only 1h, so mint it immediately before the push.
      - name: Generate push token
        id: push_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}

      - name: Commit output to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/
          if ! git diff --cached --quiet; then
            git commit -m "data: monthly pipeline refresh $(date +%Y-%m)"
            # Push as the app (ruleset bypass actor); GITHUB_TOKEN cannot bypass the required-PR rule.
            git push "https://x-access-token:${{ steps.push_token.outputs.token }}@github.com/${{ github.repository }}.git" HEAD:main
          else
            echo "No output changes to commit"
          fi

  verify:
    needs: refresh
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Report status
        run: |
          echo "## Pipeline Results"
          echo "Converged: ${{ needs.refresh.outputs.converged }}"
          echo "Runs completed: ${{ needs.refresh.outputs.runs_completed }}"
          echo "Last API calls: ${{ needs.refresh.outputs.last_api_calls }}"
          echo "Job result: ${{ needs.refresh.result }}"

      - name: Re-trigger if not converged
        if: (needs.refresh.result == 'success' || needs.refresh.result == 'cancelled') && needs.refresh.outputs.converged != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip re-trigger only if a DIFFERENT run is already in progress
          # (prevents cascade). Exclude the current run: while this verify job
          # executes, its own run is still 'in_progress', so counting it would
          # make a timed-out run always self-skip and stall the chain.
          running=$(gh run list --workflow="Monthly Pipeline Refresh" --status=in_progress --json databaseId --jq "[.[] | select(.databaseId != ${{ github.run_id }})] | length" --repo "${{ github.repository }}")
          if [ "$running" -gt 0 ]; then
            echo "::notice::Another run is already in progress — skipping re-trigger"
            exit 0
          fi
          # Runaway guard: cap total runs per calendar month so a never-converging
          # month cannot cascade into unbounded Actions minutes / API-quota burn.
          MAX_MONTHLY_RUNS=12
          month_start=$(date +%Y-%m-01)
          month_count=$(gh run list --workflow="Monthly Pipeline Refresh" --created ">=${month_start}" --json databaseId --jq 'length' --repo "${{ github.repository }}")
          if [ "$month_count" -ge "$MAX_MONTHLY_RUNS" ]; then
            echo "::warning::Reached ${MAX_MONTHLY_RUNS} runs this month (${month_count}) — not re-triggering to avoid runaway; investigate convergence."
            exit 0
          fi
          echo "Pipeline did not converge — re-triggering with saved cache"
          gh workflow run "Monthly Pipeline Refresh" --repo "${{ github.repository }}"
          echo "::notice::Re-triggered workflow. Cache was saved incrementally — next run resumes from where this one stopped."

      - name: Fail if pipeline errored
        if: needs.refresh.result == 'failure'
        run: |
          echo "::error::Pipeline failed with errors. Check the refresh job logs."
          echo "Cache was saved before failure — manual re-trigger will resume from last good state."
          exit 1

  sync-website:
    needs: [refresh, verify]
    if: needs.refresh.result == 'success' && needs.refresh.outputs.converged == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger mapslab-website publication sync
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_SYNC_TOKEN }}
        run: |
          echo "Triggering mapslab-website import-publications workflow..."
          gh api repos/MAPS-Lab/mapslab-website/dispatches \
            --method POST \
            -f event_type=citeforge-refresh
          echo "::notice::Dispatched citeforge-refresh event to mapslab-website"
