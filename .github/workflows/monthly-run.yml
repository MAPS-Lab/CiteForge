name: Monthly Citation Update

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of every month at 06:00 UTC
  workflow_dispatch:       # Manual trigger button

permissions:
  contents: write

jobs:
  update-citations:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-3.13-${{ hashFiles('pyproject.toml') }}

    - name: Cache API responses
      uses: actions/cache@v4
      with:
        path: data/api_cache
        key: api-cache-${{ github.run_id }}
        restore-keys: api-cache-

    - name: Install dependencies
      run: pip install -e .

    - name: Create API key files
      env:
        SERPAPI_KEY: ${{ secrets.SERPAPI }}
        SEMANTIC_KEY: ${{ secrets.SEMANTICSCHOLAR }}
        OPENREVIEW_KEY: ${{ secrets.OPENREVIEW }}
        GEMINI_KEY: ${{ secrets.GEMINI }}
      run: |
        mkdir -p keys
        echo "$SERPAPI_KEY" > keys/SerpAPI.key
        echo "$SEMANTIC_KEY" > keys/Semantic.key
        echo "$OPENREVIEW_KEY" > keys/OpenReview.key
        echo "$GEMINI_KEY" > keys/Gemini.key

    - name: Run CiteForge pipeline
      env:
        CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
      run: python main.py

    - name: Commit updated references
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add output/ data/api_cache/
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "chore: monthly citation update ($(date +%Y-%m))"
          git push
        fi

    - name: Upload run logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: citeforge-logs-${{ github.run_id }}
        path: output/**/*.log
        retention-days: 30
