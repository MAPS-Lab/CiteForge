name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Lint (ruff)
      run: ruff check src/ tests/ main.py

    - name: Type check (mypy)
      run: mypy src/ main.py

  test:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Create API key files
      env:
        SERPAPI_KEY: ${{ secrets.SERPAPI }}
        SERPLY_KEY: ${{ secrets.SERPLY }}
        SEMANTIC_KEY: ${{ secrets.SEMANTICSCHOLAR }}
        OPENREVIEW_KEY: ${{ secrets.OPENREVIEW }}
        GEMINI_KEY: ${{ secrets.GEMINI }}
      run: |
        mkdir -p keys
        echo "$SERPAPI_KEY" > keys/SerpAPI.key
        echo "$SERPLY_KEY" > keys/Serply.key
        echo "$SEMANTIC_KEY" > keys/Semantic.key
        echo "$OPENREVIEW_KEY" > keys/OpenReview.key
        echo "$GEMINI_KEY" > keys/Gemini.key

    - name: Run tests with coverage
      run: pytest --cov=src --cov=main --cov-report=term-missing --cov-report=xml --cov-fail-under=60

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-${{ matrix.python-version }}
        path: coverage.xml
        retention-days: 7

    - name: Upload test results on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          .pytest_cache/
        retention-days: 7
