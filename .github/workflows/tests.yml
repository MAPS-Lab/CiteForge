name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: "3.12"

    - name: Cache pip dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-lint-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --require-hashes -r requirements-dev.lock
        pip install -e . --no-deps

    - name: Lint (ruff)
      run: ruff check citeforge/ tests/ main.py

    - name: Type check (mypy)
      run: mypy citeforge/ main.py

  test:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --require-hashes -r requirements-dev.lock
        pip install -e . --no-deps

    - name: Create API key files
      env:
        SERPAPI_KEY: ${{ secrets.SERPAPI }}
        SERPLY_KEY: ${{ secrets.SERPLY }}
        SEMANTIC_KEY: ${{ secrets.SEMANTICSCHOLAR }}
        OPENREVIEW_KEY: ${{ secrets.OPENREVIEW }}
        GEMINI_KEY: ${{ secrets.GEMINI }}
      run: |
        mkdir -p keys
        echo "$SERPAPI_KEY" > keys/SerpAPI.key
        echo "$SERPLY_KEY" > keys/Serply.key
        echo "$SEMANTIC_KEY" > keys/Semantic.key
        echo "$OPENREVIEW_KEY" > keys/OpenReview.key
        echo "$GEMINI_KEY" > keys/Gemini.key

    - name: Run tests with coverage
      run: pytest --cov=citeforge --cov=main --cov-report=term-missing --cov-report=xml --cov-fail-under=68

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: coverage-${{ matrix.python-version }}
        path: coverage.xml
        retention-days: 7

    - name: Upload test results on failure
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          .pytest_cache/
        retention-days: 7
