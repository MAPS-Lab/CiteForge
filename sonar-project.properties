sonar.projectKey=gabrielspadon_CiteForge
sonar.projectName=CiteForge
sonar.projectVersion=1.0.0
sonar.host.url=http://localhost:9002

sonar.sources=src,main.py
sonar.tests=tests
sonar.sourceEncoding=UTF-8

sonar.python.version=3.10,3.11,3.12,3.13
sonar.python.coverage.reportPaths=coverage.xml

sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/.git/**,**/*.md,**/*.egg-info/**,**/.venv/**,**/.mypy_cache/**,**/.pytest_cache/**,**/.ruff_cache/**,**/data/**,**/keys/**,**/output/**
sonar.coverage.exclusions=tests/**,**/conftest.py,**/test_*.py,**/fixtures/**
sonar.cpd.exclusions=**/conftest.py

sonar.scm.provider=git

sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

sonar.cpd.python.minimumTokens=50
sonar.cpd.python.minimumLines=5

# S3776: API orchestration, BibTeX parsing, and text processing functions are inherently complex
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.py
# S125: Inline comments explaining values are not commented code
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S125
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.py
# S3358: Ruff SIM108 enforces ternary expressions, which can produce nested ternaries
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S3358
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.py

# S2245: random.random() used for non-cryptographic request jitter (anti-detection delays)
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S2245
sonar.issue.ignore.multicriteria.e4.resourceKey=src/clients/scholar_browser.py
# S5852: Regex operates on short author-name strings (<100 chars) with bounded character classes
sonar.issue.ignore.multicriteria.e5.ruleKey=python:S5852
sonar.issue.ignore.multicriteria.e5.resourceKey=src/text_utils.py
# S7632: NOSONAR suppression syntax variation
sonar.issue.ignore.multicriteria.e6.ruleKey=python:S7632
sonar.issue.ignore.multicriteria.e6.resourceKey=src/clients/scholar_browser.py

sonar.links.homepage=https://github.com/gabrielspadon/CiteForge
sonar.links.ci=https://github.com/gabrielspadon/CiteForge/actions
sonar.links.issue=https://github.com/gabrielspadon/CiteForge/issues
sonar.links.scm=https://github.com/gabrielspadon/CiteForge
